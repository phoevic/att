<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 관리 시스템🍀</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 선생님의 원본 폰트 및 스타일 유지 */
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal; font-display: swap;
        }
        :root { --primary: #ff85a1; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(#f9a8d415 1px, transparent 1px), linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .soft-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 2.5rem; border: 2px solid white; box-shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.1); }
        .bubble-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 4px solid rgba(0,0,0,0.1); }
        .bubble-btn:active { transform: scale(0.96) translateY(2px); border-bottom-width: 1px; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 선생님의 새로운 앱스 스크립트 URL
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQAi-WJ6rFhbJCCedPsLBNJG0milzi3yY_umdCuv2zaPrJgZlBqg7Vu1EUM3Q61atE/exec";

        function App() {
            const [appId] = useState(new URLSearchParams(window.location.search).get('id') || 'default');
            const [view, setView] = useState('checkin'); 
            const [isLoading, setIsLoading] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '', formUrl: '', passcode: '0000',
                studentIdEntry: '', nameEntry: '', reasonEntry: '', responseSheetId: ''
            });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchConfig();
                return () => clearInterval(timer);
            }, [appId]);

            const fetchConfig = () => {
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => { if (data && !data.error) setConfig(prev => ({ ...prev, ...data })); });
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ ...config, id: appId }) 
                    });
                    showToast('success', '설정이 저장되었습니다! ✨');
                    setTimeout(fetchConfig, 1000); 
                } catch (err) { alert('저장 실패!'); }
                finally { setIsLoading(false); }
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('설정에서 구글 폼 주소를 먼저 입력해줘!');
                setIsLoading(true);
                try {
                    let baseUrl = config.formUrl.split('?')[0].replace('/viewform', '/formResponse').replace('/edit', '/formResponse');
                    const params = new URLSearchParams();
                    const getEntryKey = (val) => String(val).startsWith('entry.') ? val : `entry.${val}`;
                    
                    params.append(getEntryKey(config.studentIdEntry), studentId);
                    params.append(getEntryKey(config.nameEntry), studentName);
                    if (config.reasonEntry) params.append(getEntryKey(config.reasonEntry), reason);

                    await fetch(baseUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
                    showToast('success', `${studentName}님, 출석 완료! 🍀`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) { showToast('error', '전송 실패!'); }
                finally { setIsLoading(false); }
            };

            // 조회 로직
            const fetchHistory = (e) => {
                e.preventDefault();
                setIsLoading(true);
                setHistoryData(null);
                
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) showToast('error', data.error);
                        else setHistoryData(data.history || []);
                    })
                    .catch(() => showToast('error', '조회 중 오류 발생!'))
                    .finally(() => setIsLoading(false));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/60 border-x border-pink-100 pb-32">
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-in slide-in-from-top duration-500">
                            <div className={

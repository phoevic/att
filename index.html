<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석하자🍀</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 온글잎 박다현 폰트 적용 */
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        
        :root { --primary: #ff85a1; --bg: #fdf2f8; }
        * { font-family: 'OngleipParkDahyeon', sans-serif !important; letter-spacing: -0.02em; }
        
        body {
            background-color: var(--bg);
            /* 모눈종이 패턴 배경 */
            background-image: 
                linear-gradient(#f9a8d415 1px, transparent 1px),
                linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 로딩 화면 */
        #loading-screen {
            position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .loading-bar-container { width: 150px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loading-bar { width: 100%; height: 100%; background: var(--primary); animation: loading-progress 2s infinite ease-in-out; transform-origin: left; }
        @keyframes loading-progress { 0% { transform: scaleX(0); } 50% { transform: scaleX(1); } 100% { transform: scaleX(0); transform-origin: right; } }

        /* 카드 스타일 */
        .soft-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); 
            border-radius: 2rem; 
            box-shadow: 0 12px 30px -5px rgba(244, 114, 182, 0.15); 
            border: 2px solid white; 
        }
        
        /* 버튼 바운스 효과 */
        .bubble-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 4px solid rgba(0,0,0,0.1); }
        .bubble-btn:active { transform: scale(0.96) translateY(2px); border-bottom-width: 1px; }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">
    <!-- 초기 로딩 화면 -->
    <div id="loading-screen">
        <div class="text-rose-400 text-6xl mb-6 floating">†</div> 
        <div class="text-rose-500 font-bold text-2xl tracking-tighter">시스템을 불러오는 중입니다..</div>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
        <div class="mt-4 text-slate-400 text-sm font-bold">잠시만 기다려 주십시오.</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ★★★ 선생님의 구글 웹 앱 URL을 여기에 붙여넣으세요 ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2toAyJSC2gDeaOXP2g1_032jhzSk6L8v2SalMjD8UX3lCgkcj6bshY8psWeW0Vi4Z/exec";

        function App() {
            const [appId, setAppId] = useState(new URLSearchParams(window.location.search).get('id') || 'default');
            const [view, setView] = useState('checkin'); // checkin, history, settings
            const [isLoading, setIsLoading] = useState(false);
            const [isConfigLoading, setIsConfigLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 모달 및 입력 상태
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [showConfigPass, setShowConfigPass] = useState(false);
            const [historyData, setHistoryData] = useState(null);

            const [config, setConfig] = useState({
                id: appId, className: '', formUrl: '', passcode: '0000',
                studentIdEntry: '', nameEntry: '', reasonEntry: '', responseSheetId: ''
            });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            // 실시간 시계
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 로딩 화면 제거
            useEffect(() => {
                if (!isConfigLoading) {
                    const loader = document.getElementById('loading-screen');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                }
            }, [isConfigLoading]);

            useEffect(() => { fetchConfig(); }, [appId]);

            const fetchConfig = () => {
                setIsConfigLoading(true);
                fetch(`${GOOGLE_SCRIPT_URL}?appId=${appId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.className) {
                            if (data.passcode !== undefined) data.passcode = String(data.passcode);
                            setConfig(data);
                        } else {
                            setConfig(prev => ({ ...prev, id: appId }));
                        }
                    })
                    .finally(() => setIsConfigLoading(false));
            };

            const showToast = (type, text) => {
                setMsg({ type, text });
                setTimeout(() => setMsg({ type: '', text: '' }), 3000);
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(config) });
                    showToast('success', '설정이 안전하게 저장되었습니다! ✨');
                } catch (err) {
                    alert('저장 중 오류가 발생했습니다.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('환경 설정에서 양식 주소를 먼저 입력해 주십시오.');
                setIsLoading(true);
                const formResponseUrl = config.formUrl.replace('/viewform', '/formResponse');
                const formData = new URLSearchParams();
                const fId = (id) => id.toString().startsWith('entry.') ? id : `entry.${id}`;
                formData.append(fId(config.studentIdEntry), studentId);
                formData.append(fId(config.nameEntry), studentName);
                if (config.reasonEntry && reason) formData.append(fId(config.reasonEntry), reason);

                try {
                    await fetch(formResponseUrl, { method: 'POST', mode: 'no-cors', body: formData.toString() });
                    showToast('success', `${studentName}님, 출석이 정상적으로 완료되었습니다.`);
                    setStudentId(''); setStudentName(''); setReason('');
                } catch (err) {
                    showToast('error', '전송 오류가 발생했습니다. 네트워크를 확인해 주십시오.');
                } finally {
                    setIsLoading(false);
                }
            };

            const fetchHistory = (e) => {
                e.preventDefault();
                if (!studentId || !studentName) return alert('학번과 성명을 모두 입력해 주십시오.');
                setIsLoading(true);
                setHistoryData(null);
                fetch(`${GOOGLE_SCRIPT_URL}?type=history&appId=${appId}&studentId=${studentId}&studentName=${studentName}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) showToast('error', data.error);
                        else setHistoryData(data.history);
                    })
                    .catch(() => showToast('error', '기록을 가져오지 못했습니다.'))
                    .finally(() => setIsLoading(false));
            };

            const copyShareLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?id=${appId}`;
                const tempInput = document.createElement('input');
                tempInput.value = url;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                showToast('success', '공유 주소가 복사되었습니다! 💌');
            };

            const verifyPassword = (e) => {
                e.preventDefault();
                if (String(passInput).trim() === String(config.passcode || '0000').trim()) {
                    setShowPassModal(false);
                    setView('settings');
                } else {
                    setPassError(true);
                    setPassInput('');
                }
            };

            if (isConfigLoading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/40 overflow-hidden border-x border-pink-100 pb-32">
                    
                    {/* 상단 팝업 알림 */}
                    {msg.text && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[200] w-[85%] max-w-xs animate-in slide-in-from-top duration-500">
                            <div className={`p-4 rounded-[1.5rem] text-center font-bold text-sm shadow-2xl border-2 ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-rose-50 text-rose-700 border-rose-100'}`}>
                                <div className="flex items-center justify-center gap-2">
                                    <span>{msg.type === 'success' ? '✨' : '⚠️'}</span>
                                    {msg.text}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 배경 장식 고양이들 (폰트 특수문자 활용) */}
                    <div className="absolute top-20 left-6 text-3xl opacity-10 floating">♤</div>
                    <div className="absolute top-60 right-8 text-3xl opacity-10 floating delay-150">♧</div>
                    <div className="absolute bottom-80 left-10 text-3xl opacity-10 floating delay-300">†</div>

                    <header className="relative z-10 px-8 pt-16 pb-6 text-center">
                        <div className="inline-block px-8 py-3 rounded-full bg-white shadow-sm border border-pink-100 mb-4 transform -rotate-1">
                            <h1 className="text-2xl font-bold text-pink-500 flex items-center gap-2">
                                <span>£</span> {config.className || "출석 관리 플랫폼"} <span>¢</span>
                            </h1>
                        </div>
                        <p className="text-[10px] font-bold text-pink-300 uppercase tracking-[0.3em]">Class Identification: {appId}</p>
                    </header>

                    <main className="relative z-10 p-6 flex-grow overflow-y-auto">
                        {view === 'checkin' && (
                            <div className="space-y-6 animate-in fade-in zoom-in duration-500">
                                <div className="soft-card p-6 text-center">
                                    <div className="text-5xl font-bold text-slate-700 mb-2 tabular-nums">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                    <div className="flex items-center justify-center gap-2 text-pink-400 text-xs font-bold uppercase tracking-widest">
                                        <span>♤</span> Live Attendance System <span>♧</span>
                                    </div>
                                </div>

                                <form onSubmit={handleCheckIn} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">†</span> 학번
                                        </label>
                                        <input className="w-full p-5 rounded-[1.8rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-xl transition-all shadow-sm text-slate-700" 
                                               placeholder="예: 30421" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">£</span> 성명
                                        </label>
                                        <input className="w-full p-5 rounded-[1.8rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-xl transition-all shadow-sm text-slate-700" 
                                               placeholder="이름을 입력하세요." value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">¢</span> 사유 입력
                                        </label>
                                        <textarea className="w-full p-5 rounded-[1.8rem] border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold min-h-[130px] resize-none transition-all shadow-sm text-slate-700" 
                                               placeholder="지각 조퇴 결석 사유 입력! or 하고 싶은 말" value={reason} onChange={e=>setReason(e.target.value)} />
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-5 rounded-[2rem] shadow-xl text-xl mt-4 flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50">
                                        {isLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : <i className="fa-solid fa-signature"></i>}
                                        출석 완료하기
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6 animate-in slide-in-from-right duration-500">
                                <h2 className="text-2xl font-bold text-pink-500 text-center flex items-center justify-center gap-2">
                                    🐾 개인 출석 현황 조회
                                </h2>
                                <form onSubmit={fetchHistory} className="soft-card p-6 space-y-4">
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 outline-none focus:border-pink-200 font-bold text-lg" placeholder="학번" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    <input className="w-full p-4 rounded-2xl border-2 border-pink-50 outline-none focus:border-pink-200 font-bold text-lg" placeholder="성명" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    <button disabled={isLoading} className="w-full bg-pink-400 text-white font-bold py-4 rounded-2xl shadow-md bubble-btn flex items-center justify-center gap-2">
                                        {isLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : "조회하기"}
                                    </button>
                                </form>
                                {historyData && (
                                    <div className="space-y-3 pb-10">
                                        {historyData.length > 0 ? historyData.map((h, i) => (
                                            <div key={i} className="soft-card p-5 flex justify-between items-center animate-in fade-in slide-in-from-bottom duration-300 border-l-8 border-pink-200">
                                                <div className="space-y-1">
                                                    <p className="text-[10px] text-slate-400 font-bold tracking-tight">{h.date}</p>
                                                    <p className="font-bold text-slate-700 text-lg">
                                                        {h.reason ? `📝 ${h.reason}` : "✅ 정상 출석"}
                                                    </p>
                                                </div>
                                                <span className="text-3xl text-pink-100">♤</span>
                                            </div>
                                        )) : (
                                            <div className="text-center py-20">
                                                <p className="text-slate-400 font-bold">출석 기록이 발견되지 않았습니다.</p>
                                                <p className="text-xs text-slate-300 mt-2">학번과 이름을 다시 확인해 주세요.</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-5 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center bg-white p-5 rounded-3xl border border-pink-100 shadow-sm">
                                    <h2 className="text-lg font-bold text-pink-500 flex items-center gap-2">
                                        <i className="fa-solid fa-sliders"></i> 시스템 환경 설정
                                    </h2>
                                    <button onClick={copyShareLink} className="bubble-btn text-xs bg-pink-50 text-pink-500 px-5 py-2 rounded-full font-bold border border-pink-100">
                                        주소 복사
                                    </button>
                                </div>
                                <form onSubmit={handleSaveSettings} className="soft-card p-6 space-y-5">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">학급 명칭</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">구글 폼 주소 (/viewform)</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent text-xs font-bold" placeholder="https://docs.google.com/forms/..." value={config.formUrl} onChange={e=>setConfig({...config, formUrl:e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-rose-400 uppercase ml-2 italic">응답 시트 ID (Spreadsheet ID)</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent text-[10px] font-bold text-rose-500" placeholder="시트 주소의 긴 문자열" value={config.responseSheetId} onChange={e=>setConfig({...config, responseSheetId:e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">학번 ID</label>
                                                <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" placeholder="entry.123" value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} required />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">이름 ID</label>
                                                <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" placeholder="entry.456" value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} required />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">사유 입력 ID (선택)</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" placeholder="entry.789" value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-pink-500 uppercase ml-2 flex items-center gap-1">🔒 관리자 비밀번호</label>
                                            <div className="relative">
                                                <input type={showConfigPass ? "text" : "password"} className="w-full p-3 border-b-2 border-pink-100 outline-none focus:border-pink-300 bg-pink-50/20 font-bold pr-12" value={config.passcode} onChange={e=>setConfig({...config, passcode:e.target.value})} required />
                                                <button type="button" onClick={()=>setShowConfigPass(!showConfigPass)} className="absolute right-2 top-1/2 -translate-y-1/2 text-pink-300 p-2"><i className={`fa-solid ${showConfigPass ? 'fa-eye-slash' : 'fa-eye'}`}></i></button>
                                            </div>
                                        </div>
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-slate-700 text-white font-bold py-5 rounded-[1.5rem] shadow-lg mt-4 flex items-center justify-center gap-2 active:scale-95">
                                        {isLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : <i className="fa-solid fa-cloud-arrow-up"></i>}
                                        설정 정보 저장하기
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* 하단 내비게이션 바 */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white/80 backdrop-blur-xl border-2 border-white/50 flex justify-around p-3 rounded-[3rem] shadow-2xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl transition-all ${view==='checkin' ? 'text-pink-500 scale-110 drop-shadow-sm' : 'text-slate-300'}`}>
                            <span className="text-2xl mb-1">{view==='checkin' ? '🐾' : '📝'}</span>
                            <span className="text-[10px] font-bold">출석하기</span>
                        </button>
                        <button onClick={()=>setView('history')} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl transition-all ${view==='history' ? 'text-pink-500 scale-110 drop-shadow-sm' : 'text-slate-300'}`}>
                            <span className="text-2xl mb-1">{view==='history' ? '🔍' : '📜'}</span>
                            <span className="text-[10px] font-bold">조회하기</span>
                        </button>
                        <button onClick={()=>{ if(view!=='settings') { setPassInput(''); setPassError(false); setShowPassModal(true); } }} className={`flex flex-col items-center gap-1 py-2 px-5 rounded-2xl transition-all ${view==='settings' ? 'text-pink-500 scale-110 drop-shadow-sm' : 'text-slate-300'}`}>
                            <span className="text-2xl mb-1">{view==='settings' ? '⚙️' : '🎀'}</span>
                            <span className="text-[10px] font-bold">환경설정</span>
                        </button>
                    </nav>

                    {/* 비밀번호 확인 모달 */}
                    {showPassModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-pink-900/20 backdrop-blur-md animate-in fade-in duration-300">
                            <div className="soft-card w-full max-w-xs p-10 text-center animate-in zoom-in duration-300">
                                <div className="text-5xl mb-6">†</div>
                                <h3 className="text-xl font-bold text-slate-700 mb-2">비밀번호 확인</h3>
                                <p className="text-xs text-slate-400 mb-8 font-bold leading-relaxed">선생님 전용 메뉴입니다.<br/>설정된 비밀번호를 입력해 주세요.</p>
                                <form onSubmit={verifyPassword} className="space-y-6">
                                    <input type="password" autoFocus className={`w-full p-4 rounded-2xl border-2 outline-none text-center text-3xl tracking-widest font-bold transition-all ${passError ? 'border-rose-400 bg-rose-50 animate-bounce' : 'border-pink-50 bg-pink-50/20'}`} placeholder="●●●●" value={passInput} onChange={(e)=>{setPassInput(e.target.value); setPassError(false);}} />
                                    {passError && <p className="text-[10px] text-rose-500 font-bold -mt-4 animate-pulse">비밀번호가 일치하지 않습니다! ¢</p>}
                                    <div className="grid grid-cols-2 gap-4">
                                        <button type="button" onClick={()=>setShowPassModal(false)} className="p-4 rounded-2xl bg-slate-100 text-slate-500 font-bold bubble-btn">취소</button>
                                        <button type="submit" className="p-4 rounded-2xl bg-pink-400 text-white font-bold bubble-btn shadow-lg shadow-pink-200">확인</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
